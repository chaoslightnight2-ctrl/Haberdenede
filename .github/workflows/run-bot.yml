name: Run Turkey News Shorts Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "5 3 * * *"

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sudo sed -i 's#rights="none" pattern="@\*"#rights="read|write" pattern="@*"#' /etc/ImageMagick-6/policy.xml || true
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate YouTube OAuth
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
        run: |
          python - <<'PY'
          import json, os, sys
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          cfg = json.loads(os.environ["CLIENT_SECRETS_JSON"])
          cc = cfg.get("installed") or cfg.get("web") or next(iter(cfg.values()))
          creds = Credentials(
              token=None,
              refresh_token=os.environ["YOUTUBE_REFRESH_TOKEN"],
              token_uri="https://oauth2.googleapis.com/token",
              client_id=cc["client_id"],
              client_secret=cc["client_secret"],
              scopes=["https://www.googleapis.com/auth/youtube.upload"],
          )
          try:
              creds.refresh(Request())
              print("YouTube OAuth OK")
          except Exception as e:
              print("YouTube OAuth FAILED:", repr(e))
              print("Refresh token must be generated using the exact same OAuth client_id/client_secret stored in CLIENT_SECRETS_JSON.")
              sys.exit(1)
          PY

      - name: Apply news quality patch
        run: python patch_news_quality.py

      - name: Apply TTS fallback patch
        run: python patch_tts.py

      - name: Run bot
        env:
          TZ: Europe/Istanbul
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
        run: python main.py

      - name: Commit history files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news_history.json selected_news.json video_plan.json
          git diff --cached --quiet || git commit -m "Update news history and video plan"
          git push
