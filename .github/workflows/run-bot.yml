name: Run Turkey News Shorts Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "5 3 * * *"

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sudo sed -i 's#rights="none" pattern="@\*"#rights="read|write" pattern="@*"#' /etc/ImageMagick-6/policy.xml || true
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install --upgrade edge-tts
          python -m pip show edge-tts

      - name: Check Edge TTS before rendering
        env:
          VOICE: tr-TR-AhmetNeural
          VOICE_RATE: +18%
          VOICE_PITCH: -4Hz
        run: python edge_tts_healthcheck.py

      - name: Apply patches
        run: |
          python patch_news_quality.py
          python patch_clickbait_hooks.py
          python patch_tts.py
          python patch_subtitles_denede.py
          python patch_turkish_subtitle_chars.py
          python patch_viral_tags.py
          python patch_disable_youtube_upload.py

      - name: Run bot
        env:
          TZ: Europe/Istanbul
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          VOICE: tr-TR-AhmetNeural
          VOICE_RATE: +18%
          VOICE_PITCH: -4Hz
        run: python main.py

      - name: Save rendered shorts in repo
        if: success()
        run: |
          mkdir -p generated_videos
          python - <<'PY'
          from pathlib import Path
          import shutil
          src = Path('output')
          dst = Path('generated_videos')
          dst.mkdir(exist_ok=True)
          for old in dst.glob('*.mp4'):
              old.unlink()
          for item in sorted(src.glob('*.mp4')):
              shutil.copy2(item, dst / item.name)
              print(dst / item.name)
          PY

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-news-shorts
          path: |
            output/*.mp4
            generated_videos/*.mp4
            selected_news.json
            video_plan.json
            bot.log
            edge_tts_healthcheck.mp3
          if-no-files-found: warn
          retention-days: 7

      - name: Commit rendered shorts and history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated_videos selected_news.json video_plan.json news_history.json
          git diff --cached --quiet || git commit -m "Save generated Shorts videos"
          git push
